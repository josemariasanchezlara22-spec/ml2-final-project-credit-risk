steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/ml-big-data-q2-up/credit-risk/credit-risk-app:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/ml-big-data-q2-up/credit-risk/credit-risk-app:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - credit-risk-app
      - --image
      - us-central1-docker.pkg.dev/ml-big-data-q2-up/credit-risk/credit-risk-app:$COMMIT_SHA
      - --region
      - us-central1
      - --allow-unauthenticated
      - --memory
      - 2Gi
      - --cpu
      - "2"
      - --timeout
      - "3600"
      - --set-env-vars
      - BUCKET_NAME=am-up-01-credit-risk2,ARTIFACT_PREFIX=xgb_optuna_v2,MODEL_BLOB=xgb_optuna_v2/xgboost_credit_risk.pkl,COLUMNS_BLOB=xgb_optuna_v2/model_columns.pkl,METADATA_BLOB=xgb_optuna_v2/model_metadata.pkl

images:
  - us-central1-docker.pkg.dev/ml-big-data-q2-up/credit-risk/credit-risk-app:$COMMIT_SHA